name: Metrics

on:
  schedule:
    - cron: "55 23 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: fwerkor
          template: classic

          plugin_rss: true
          plugin_rss_source: https://blog.fwerkor.com/feed
          plugin_rss_limit: 4

          plugin_isocalendar: true
          plugin_reactions: true
          plugin_stargazers: true
          plugin_calendar: true
          plugin_calendar_limit: 5
