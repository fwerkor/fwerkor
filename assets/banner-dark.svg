<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FWERKOR profile banner</title>
  <desc id="desc">A mobile-friendly dark themed GitHub profile banner for FWERKOR.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111E"/>
      <stop offset="0.48" stop-color="#10253A"/>
      <stop offset="1" stop-color="#0C1C19"/>
    </linearGradient>
    <linearGradient id="glass" x1="46" y1="34" x2="1154" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10243A" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#0A141E" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="accent" x1="98" y1="0" x2="468" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="grid" x1="72" y1="0" x2="1128" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blurA" x="780" y="40" width="280" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
    <filter id="blurB" x="938" y="122" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="380" rx="24" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g opacity="0.6">
    <path d="M72 96H1128" stroke="url(#grid)"/>
    <path d="M72 160H1128" stroke="url(#grid)"/>
    <path d="M72 224H1128" stroke="url(#grid)"/>
    <path d="M72 288H1128" stroke="url(#grid)"/>
    <path d="M72 352H1128" stroke="url(#grid)"/>
    <path d="M184 56V364" stroke="url(#grid)"/>
    <path d="M328 56V364" stroke="url(#grid)"/>
    <path d="M472 56V364" stroke="url(#grid)"/>
    <path d="M616 56V364" stroke="url(#grid)"/>
    <path d="M760 56V364" stroke="url(#grid)"/>
    <path d="M904 56V364" stroke="url(#grid)"/>
    <path d="M1048 56V364" stroke="url(#grid)"/>
  </g>

  <circle cx="910" cy="142" r="70" fill="#22D3EE" fill-opacity="0.18" filter="url(#blurA)"/>
  <circle cx="1048" cy="232" r="54" fill="#34D399" fill-opacity="0.16" filter="url(#blurB)"/>

  <circle cx="930" cy="94" r="3" fill="#E2E8F0"/>
  <circle cx="972" cy="78" r="2.5" fill="#7DD3FC"/>
  <circle cx="1012" cy="106" r="2.5" fill="#A5F3FC"/>
  <circle cx="1068" cy="90" r="3" fill="#F8FAFC"/>
  <circle cx="1106" cy="120" r="2.5" fill="#34D399"/>
  <path d="M930 94L972 78L1012 106L1068 90L1106 120" stroke="#94A3B8" stroke-opacity="0.5" stroke-width="1.4"/>

  <text x="76" y="82" fill="#93C5FD" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="17" letter-spacing="1.5">$ whoami</text>
  <text x="76" y="146" fill="#F8FAFC" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="96" font-weight="700" letter-spacing="4">FWERKOR</text>
  <text x="80" y="188" fill="#34D399" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="34" letter-spacing="2.4">CASTRONAUT</text>

  <rect x="76" y="206" width="374" height="6" rx="3" fill="url(#accent)"/>

  <text x="76" y="254" fill="#E2E8F0" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="600">
    <tspan x="76" dy="0">builds open systems, developer tooling,</tspan>
    <tspan x="76" dy="40">and small corners of the web that feel alive</tspan>
  </text>

  <rect x="76" y="330" width="180" height="34" rx="17" fill="#0D2234" stroke="#7DD3FC" stroke-opacity="0.24"/>
  <rect x="272" y="330" width="180" height="34" rx="17" fill="#0D2234" stroke="#7DD3FC" stroke-opacity="0.24"/>
  <rect x="468" y="330" width="180" height="34" rx="17" fill="#0D2234" stroke="#7DD3FC" stroke-opacity="0.24"/>
  <text x="166" y="352" text-anchor="middle" fill="#F8FAFC" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="17">SYSTEMS</text>
  <text x="362" y="352" text-anchor="middle" fill="#F8FAFC" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="17">TOOLING</text>
  <text x="558" y="352" text-anchor="middle" fill="#F8FAFC" font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="17">WRITING</text>

  <text x="760" y="332" fill="#C7D2E0" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic">forming into my dreamtale.</text>
</svg>
